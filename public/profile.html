<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Mitos y Leyendas</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/floating-cards.css">
    <style>
        body {
            display: block !important;
            padding: 0 !important;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }


        .profile-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        
        .navbar {
            position: relative;
            z-index: 1000;
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 20px 20px 0 0;
            text-align: center;
            position: relative;
            z-index: 11;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }

        .profile-content {
            background: white;
            padding: 30px;
            border-radius: 0 0 20px 20px;
            position: relative;
            z-index: 11;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .nav-links a {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <!-- Cartas flotantes de fondo -->
    <div class="floating-cards-background" id="floatingCardsBackground"></div>

    <!-- Barra de navegación -->
    <nav class="navbar">
        <div class="navbar-container" id="navbar-container">
            <!-- Se llenará dinámicamente -->
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar" id="avatar">
                👤
            </div>
            <h1 id="username">Cargando...</h1>
            <p id="email"></p>
        </div>

        <div class="profile-content">
            <div id="errorMessage" class="message error"></div>
            <div id="successMessage" class="message success"></div>

            <h2>Estadísticas</h2>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="value" id="partidasJugadas">-</div>
                    <div class="label">Partidas Jugadas</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="partidasGanadas">-</div>
                    <div class="label">Victorias</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="partidasPerdidas">-</div>
                    <div class="label">Derrotas</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="puntosTotales">-</div>
                    <div class="label">Puntos Totales</div>
                </div>
            </div>

            <div class="nav-links">
                <a href="decks.html">Mis Mazos</a>
                <a href="deck-builder.html">Crear Mazo</a>
                <a href="/">Inicio</a>
                <a href="#" onclick="logout(); return false;">Cerrar Sesión</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/floating-cards.js"></script>
    <script>
        // currentUser ya está declarado en navbar.js, solo lo usamos aquí
        // loadFloatingCards() está en floating-cards.js y se ejecuta automáticamente

        async function loadProfile() {
            try {
                // Verificar autenticación
                const user = await checkAuth(true);
                if (!user) {
                    console.error('Usuario no autenticado');
                    return;
                }

                currentUser = user;
                console.log('Usuario autenticado:', user);

                // Cargar perfil completo
                const profileResponse = await api.getUserProfile(user.id);
                console.log('Respuesta del perfil:', profileResponse);
                
                if (profileResponse.success) {
                    const profile = profileResponse.data;
                    
                    document.getElementById('username').textContent = profile.username || 'Usuario';
                    document.getElementById('email').textContent = profile.email || '';
                    
                    if (profile.avatar_url) {
                        document.getElementById('avatar').style.backgroundImage = `url(${profile.avatar_url})`;
                        document.getElementById('avatar').textContent = '';
                    } else {
                        document.getElementById('avatar').textContent = profile.username?.charAt(0).toUpperCase() || '👤';
                    }

                    // Cargar estadísticas
                    if (profile.estadisticas) {
                        console.log('Estadísticas del perfil:', profile.estadisticas);
                        displayStats(profile.estadisticas);
                    } else {
                        console.log('Cargando estadísticas desde endpoint separado...');
                        const statsResponse = await api.getUserStats(user.id);
                        console.log('Respuesta de estadísticas:', statsResponse);
                        if (statsResponse.success) {
                            displayStats(statsResponse.data);
                        } else {
                            console.error('Error al cargar estadísticas:', statsResponse);
                            displayStats({});
                        }
                    }
                } else {
                    console.error('Error al cargar perfil:', profileResponse);
                    showError('Error al cargar el perfil: ' + (profileResponse.error || 'Error desconocido'));
                }
            } catch (error) {
                console.error('Error en loadProfile:', error);
                showError('Error al cargar el perfil: ' + error.message);
            }
        }

        function displayStats(stats) {
            document.getElementById('partidasJugadas').textContent = stats.partidas_jugadas || 0;
            document.getElementById('partidasGanadas').textContent = stats.partidas_ganadas || 0;
            document.getElementById('partidasPerdidas').textContent = stats.partidas_perdidas || 0;
            document.getElementById('puntosTotales').textContent = stats.puntos_totales || 0;
        }

        // loadFloatingCards() se ejecuta automáticamente desde floating-cards.js
        // Cargar perfil al iniciar
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
