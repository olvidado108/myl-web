<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Mazos - Mitos y Leyendas</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/floating-cards.css">
    <style>
        body {
            display: block !important;
            padding: 0 !important;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }


        .decks-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        
        .navbar {
            position: relative;
            z-index: 1000;
        }

        .decks-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 11;
        }

        .decks-content {
            background: white;
            padding: 30px;
            border-radius: 0 0 20px 20px;
            position: relative;
            z-index: 11;
        }

        .decks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .deck-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .deck-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .deck-card h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .deck-card .deck-info {
            color: #666;
            font-size: 0.9em;
            margin: 5px 0;
        }

        .deck-card .deck-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- Cartas flotantes de fondo -->
    <div class="floating-cards-background" id="floatingCardsBackground"></div>

    <!-- Barra de navegación -->
    <nav class="navbar">
        <div class="navbar-container" id="navbar-container">
            <!-- Se llenará dinámicamente -->
        </div>
    </nav>

    <div class="decks-container">
        <div class="decks-header">
            <div>
                <h1>🃏 Mis Mazos</h1>
                <p>Gestiona tus mazos personalizados</p>
            </div>
            <a href="deck-builder.html" class="btn btn-primary">➕ Crear Mazo</a>
        </div>

        <div class="decks-content">
            <div id="errorMessage" class="message error"></div>
            <div id="successMessage" class="message success"></div>

            <div id="decksGrid" class="decks-grid">
                <div class="empty-state">
                    <h3>Cargando mazos...</h3>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/floating-cards.js"></script>
    <script>
        async function loadDecks() {
            try {
                // Verificar autenticación
                await checkAuth(true);

                const response = await api.getDecks();
                if (response.success) {
                    displayDecks(response.data);
                } else {
                    showError('Error al cargar los mazos');
                }
            } catch (error) {
                showError('Error al cargar los mazos: ' + error.message);
            }
        }

        function displayDecks(decks) {
            const grid = document.getElementById('decksGrid');
            
            if (decks.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>No tienes mazos aún</h3>
                        <p>Crea tu primer mazo para comenzar</p>
                        <a href="deck-builder.html" class="btn btn-primary" style="margin-top: 20px; display: inline-block;">Crear Mazo</a>
                    </div>
                `;
                return;
            }

            grid.innerHTML = decks.map(deck => {
                const stats = deck.estadisticas || {};
                return `
                <div class="deck-card" onclick="viewDeck('${deck.id}')">
                    <h3>${escapeHtml(deck.nombre)}</h3>
                    <div class="deck-info">📝 ${deck.descripcion || 'Sin descripción'}</div>
                    <div class="deck-info">🎯 Formato: ${deck.formato || 'No especificado'}</div>
                    <div class="deck-info">👥 Raza: ${deck.raza || 'No especificada'}</div>
                    <div class="deck-info">🃏 Cartas: ${deck.cartas?.length || 0}/50</div>
                    <div class="deck-info">📅 Creado: ${new Date(deck.fecha_creacion).toLocaleDateString()}</div>
                    <div class="deck-stats" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e0e0e0;">
                        <div class="deck-info" style="font-weight: bold; color: #667eea; margin-bottom: 8px;">📊 Estadísticas de Juego</div>
                        <div class="deck-info">🎮 Partidas jugadas: <strong>${stats.partidas_jugadas || 0}</strong></div>
                        <div class="deck-info">✅ Victorias: <strong style="color: #28a745;">${stats.partidas_ganadas || 0}</strong></div>
                        <div class="deck-info">❌ Derrotas: <strong style="color: #dc3545;">${stats.partidas_perdidas || 0}</strong></div>
                        <div class="deck-info">🤝 Empates: <strong style="color: #ffc107;">${stats.partidas_empatadas || 0}</strong></div>
                        ${stats.partidas_jugadas > 0 ? `<div class="deck-info">📈 % Victorias: <strong style="color: #667eea;">${stats.porcentaje_victorias || 0}%</strong></div>` : ''}
                    </div>
                    <div class="deck-actions">
                        <button class="btn btn-primary btn-small" onclick="event.stopPropagation(); editDeck('${deck.id}')">Editar</button>
                        <button class="btn btn-secondary btn-small" onclick="event.stopPropagation(); deleteDeck('${deck.id}')">Eliminar</button>
                    </div>
                </div>
            `;
            }).join('');
        }

        function viewDeck(deckId) {
            window.location.href = `deck-view.html?id=${deckId}`;
        }

        function editDeck(deckId) {
            window.location.href = `deck-builder.html?id=${deckId}`;
        }

        async function deleteDeck(deckId) {
            if (!confirm('¿Estás seguro de que quieres eliminar este mazo?')) {
                return;
            }

            try {
                const response = await api.deleteDeck(deckId);
                if (response.success) {
                    showSuccess('Mazo eliminado correctamente');
                    loadDecks();
                } else {
                    showError('Error al eliminar el mazo');
                }
            } catch (error) {
                showError('Error al eliminar el mazo: ' + error.message);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Función para cargar cartas flotantes de fondo
        async function loadFloatingCards() {
            try {
                console.log('Cargando cartas flotantes...');
                
                // Verificar que la API esté disponible
                if (!api) {
                    console.error('API no está disponible');
                    return;
                }
                
                // 80 cartas para mejor efecto visual (todas diferentes)
                let response;
                try {
                    response = await api.getCards({ limite: 80 });
                } catch (apiError) {
                    console.error('Error en la llamada a la API:', apiError);
                    console.warn('No se pudieron cargar cartas de la API, continuando sin cartas de fondo');
                    return;
                }
                
                console.log('Respuesta de API:', response);
                
                if (response.success && response.data && response.data.length > 0) {
                    const cards = response.data;
                    const container = document.getElementById('floatingCardsBackground');
                    
                    if (!container) {
                        console.error('No se encontró el contenedor de cartas flotantes');
                        return;
                    }
                    
                    console.log(`Se encontraron ${cards.length} cartas`);
                    
                    // Tamaños disponibles
                    const sizes = ['small', 'medium', 'large'];
                    
                    // Filtrar solo cartas con imagen
                    const cardsWithImages = cards.filter(card => card.imagenUrl);
                    console.log(`Cartas con imagen: ${cardsWithImages.length}`);
                    
                    // Limitar a máximo 80 cartas (todas diferentes)
                    const uniqueCards = new Map();
                    const allCards = cardsWithImages.length > 0 ? cardsWithImages : cards;
                    
                    for (const card of allCards) {
                        if (!uniqueCards.has(card.id)) {
                            uniqueCards.set(card.id, card);
                            if (uniqueCards.size >= 80) break;
                        }
                    }
                    
                    const cardsToShow = Array.from(uniqueCards.values());
                    
                    console.log(`Mostrando ${cardsToShow.length} cartas`);
                    
                    // Array para almacenar posiciones de cartas ya colocadas (para evitar superposiciones)
                    const placedCards = [];
                    const minDistance = 12;
                    
                    // Función mejorada para verificar si una posición está demasiado cerca de otras cartas
                    function isPositionValid(x, y, width, height, placedCards) {
                        for (const placed of placedCards) {
                            const centerX1 = x + width / 2;
                            const centerY1 = y + height / 2;
                            const centerX2 = placed.x + placed.width / 2;
                            const centerY2 = placed.y + placed.height / 2;
                            
                            const distanceX = Math.abs(centerX1 - centerX2);
                            const distanceY = Math.abs(centerY1 - centerY2);
                            
                            const minDistX = (width / 2) + (placed.width / 2) + minDistance;
                            const minDistY = (height / 2) + (placed.height / 2) + minDistance;
                            
                            if (distanceX < minDistX && distanceY < minDistY) {
                                return false;
                            }
                        }
                        return true;
                    }
                    
                    // Función mejorada para encontrar una posición válida
                    function findValidPosition(width, height, placedCards, maxAttempts = 100) {
                        for (let attempt = 0; attempt < maxAttempts; attempt++) {
                            let left, top;
                            
                            const zone = Math.floor(Math.random() * 8);
                            switch(zone) {
                                case 0: left = 3 + Math.random() * 20; top = 3 + Math.random() * 20; break;
                                case 1: left = 3 + Math.random() * 20; top = 25 + Math.random() * 15; break;
                                case 2: left = 77 + Math.random() * 20; top = 3 + Math.random() * 20; break;
                                case 3: left = 77 + Math.random() * 20; top = 25 + Math.random() * 15; break;
                                case 4: left = 3 + Math.random() * 20; top = 77 + Math.random() * 20; break;
                                case 5: left = 3 + Math.random() * 20; top = 60 + Math.random() * 15; break;
                                case 6: left = 77 + Math.random() * 20; top = 77 + Math.random() * 20; break;
                                case 7: left = 77 + Math.random() * 20; top = 60 + Math.random() * 15; break;
                            }
                            
                            if (left > 25 && left < 75 && top > 20 && top < 80) {
                                if (Math.random() > 0.5) {
                                    left = left < 50 ? 3 + Math.random() * 20 : 77 + Math.random() * 20;
                                } else {
                                    top = top < 50 ? 3 + Math.random() * 20 : 77 + Math.random() * 20;
                                }
                            }
                            
                            if (isPositionValid(left, top, width, height, placedCards)) {
                                return { left, top };
                            }
                        }
                        const edge = Math.floor(Math.random() * 4);
                        switch(edge) {
                            case 0: return { left: 3 + Math.random() * 20, top: 10 + Math.random() * 80 };
                            case 1: return { left: 77 + Math.random() * 20, top: 10 + Math.random() * 80 };
                            case 2: return { left: 10 + Math.random() * 80, top: 3 + Math.random() * 20 };
                            default: return { left: 10 + Math.random() * 80, top: 77 + Math.random() * 20 };
                        }
                    }
                    
                    cardsToShow.forEach((card, index) => {
                        const cardElement = document.createElement('div');
                        const sizeClass = sizes[index % sizes.length];
                        cardElement.className = `floating-card ${sizeClass}`;
                        
                        let cardWidth, cardHeight;
                        if (sizeClass === 'small') {
                            cardWidth = 4.2;
                            cardHeight = 5.8;
                        } else if (sizeClass === 'medium') {
                            cardWidth = 6.25;
                            cardHeight = 8.75;
                        } else {
                            cardWidth = 8.3;
                            cardHeight = 11.7;
                        }
                        
                        const position = findValidPosition(cardWidth, cardHeight, placedCards);
                        
                        placedCards.push({
                            x: position.left,
                            y: position.top,
                            width: cardWidth,
                            height: cardHeight
                        });
                        
                        cardElement.style.left = `${position.left}%`;
                        cardElement.style.top = `${position.top}%`;
                        
                        const rotation = (Math.random() - 0.5) * 30;
                        cardElement.style.transform = `rotate(${rotation}deg)`;
                        
                        const img = document.createElement('img');
                        if (card.imagenUrl) {
                            img.src = card.imagenUrl;
                            img.loading = 'lazy';
                            img.decoding = 'async';
                            img.style.imageRendering = 'optimizeQuality';
                            console.log(`Cargando imagen ${index + 1}: ${card.imagenUrl}`);
                        } else {
                            cardElement.style.backgroundColor = 'rgba(102, 126, 234, 0.3)';
                            cardElement.style.border = '2px solid rgba(255, 255, 255, 0.4)';
                            cardElement.style.borderRadius = '8px';
                            cardElement.style.display = 'flex';
                            cardElement.style.alignItems = 'center';
                            cardElement.style.justifyContent = 'center';
                            cardElement.innerHTML = '<span style="color: rgba(255,255,255,0.6); font-size: 0.8em;">🃏</span>';
                        }
                        img.alt = card.nombre || 'Carta';
                        img.onload = function() {
                            console.log(`✓ Imagen ${index + 1} cargada: ${card.nombre || 'Sin nombre'}`);
                        };
                        img.onerror = function() {
                            console.error(`✗ Error al cargar imagen ${index + 1}: ${card.imagenUrl}`);
                            cardElement.style.backgroundColor = 'rgba(102, 126, 234, 0.3)';
                            cardElement.style.border = '2px solid rgba(255, 255, 255, 0.4)';
                            cardElement.innerHTML = '<span style="color: rgba(255,255,255,0.6); font-size: 0.8em;">🃏</span>';
                        };
                        
                        if (card.imagenUrl) {
                            cardElement.appendChild(img);
                        }
                        container.appendChild(cardElement);
                    });
                    
                    console.log(`Se agregaron ${cardsToShow.length} cartas al fondo`);
                } else {
                    console.warn('No se recibieron cartas de la API o la respuesta no tiene el formato esperado');
                }
            } catch (error) {
                console.error('Error al cargar cartas para el fondo:', error);
            }
        }

        // Cargar mazos y cartas flotantes al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadFloatingCards();
            loadDecks();
        });
    </script>
</body>
</html>
