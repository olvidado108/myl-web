<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mitos y Leyendas</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/floating-cards.css">
    <style>
        body {
            position: relative;
            overflow-x: hidden;
            /* Mantener flex para centrar el auth-container */
            display: flex !important;
            align-items: center;
            justify-content: center;
        }


        .auth-container {
            position: relative;
            z-index: 2;
            /* Mantener el centrado original - el body con flex ya lo centra */
        }

        .auth-logo {
            height: 100px;
            width: auto;
            margin: 0 auto 20px auto;
            display: block;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <!-- Cartas flotantes de fondo -->
    <div class="floating-cards-background" id="floatingCardsBackground"></div>
    <div class="auth-container">
        <div class="auth-header">
            <img src="images/logo.webp" alt="Mitos y Leyendas Logo" class="auth-logo">
            <h1>Mitos y Leyendas</h1>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        <div id="errorMessage" class="message error"></div>
        <div id="successMessage" class="message success"></div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Ingresa tu nombre de usuario"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Ingresa tu contraseña"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn btn-primary">
                Iniciar Sesión
            </button>
        </form>

        <div class="auth-footer">
            <p>¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a></p>
            <p style="margin-top: 10px;"><a href="/">Volver al inicio</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/floating-cards.js"></script>
    <script>
        // loadFloatingCards() está en floating-cards.js y se ejecuta automáticamente
    </script>
</body>
</html>
